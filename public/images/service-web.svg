<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="400" rx="24" fill="#f7f7f2"/>
  
  <!-- Clean Browser Window -->
  <rect x="100" y="90" width="440" height="220" rx="16" fill="#ffffff" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="100" y="90" width="440" height="42" rx="16" fill="#2a2a2a"/>
  
  <!-- Browser Dots -->
  <circle cx="128" cy="111" r="6" fill="#ff5f57"/>
  <circle cx="147" cy="111" r="6" fill="#ffbd2e"/>
  <circle cx="166" cy="111" r="6" fill="#28ca42"/>
  
  <!-- Code Editor -->
  <rect x="120" y="150" width="400" height="140" rx="8" fill="#1e1e1e"/>
  
  <!-- Code Lines with Syntax Highlighting -->
  <rect x="140" y="170" width="80" height="3" rx="1.5" fill="#569cd6"/>
  <rect x="140" y="180" width="120" height="3" rx="1.5" fill="#9cdcfe"/>
  <rect x="140" y="190" width="60" height="3" rx="1.5" fill="#c586c0"/>
  <rect x="140" y="200" width="100" height="3" rx="1.5" fill="#d4d4d4"/>
  <rect x="140" y="210" width="90" height="3" rx="1.5" fill="#4ec9b0"/>
  <rect x="140" y="220" width="70" height="3" rx="1.5" fill="#d4d4d4"/>
  <rect x="140" y="230" width="110" height="3" rx="1.5" fill="#ce9178"/>
  <rect x="140" y="240" width="85" height="3" rx="1.5" fill="#d4d4d4"/>
  <rect x="140" y="250" width="95" height="3" rx="1.5" fill="#569cd6"/>
  <rect x="140" y="260" width="75" height="3" rx="1.5" fill="#d4d4d4"/>
  
  <!-- Line Numbers -->
  <text x="125" y="173" font-size="10" fill="#858585" font-family="monospace">1</text>
  <text x="125" y="183" font-size="10" fill="#858585" font-family="monospace">2</text>
  <text x="125" y="193" font-size="10" fill="#858585" font-family="monospace">3</text>
  <text x="125" y="203" font-size="10" fill="#858585" font-family="monospace">4</text>
  <text x="125" y="213" font-size="10" fill="#858585" font-family="monospace">5</text>
  <text x="125" y="223" font-size="10" fill="#858585" font-family="monospace">6</text>
  <text x="125" y="233" font-size="10" fill="#858585" font-family="monospace">7</text>
  <text x="125" y="243" font-size="10" fill="#858585" font-family="monospace">8</text>
  <text x="125" y="253" font-size="10" fill="#858585" font-family="monospace">9</text>
  <text x="125" y="263" font-size="10" fill="#858585" font-family="monospace">10</text>
  
  <!-- React Logo -->
  <circle cx="460" cy="200" r="20" fill="none" stroke="#61dafb" stroke-width="3"/>
  <circle cx="460" cy="200" r="6" fill="#61dafb"/>
  <ellipse cx="460" cy="200" rx="28" ry="10" fill="none" stroke="#61dafb" stroke-width="3" transform="rotate(45 460 200)"/>
  <ellipse cx="460" cy="200" rx="28" ry="10" fill="none" stroke="#61dafb" stroke-width="3" transform="rotate(-45 460 200)"/>
</svg>
